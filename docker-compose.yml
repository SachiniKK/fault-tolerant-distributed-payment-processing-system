version: '3.8'

services:
  zookeeper:
    image: zookeeper:3.9.2
    container_name: dps-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
      ZOO_PORT: 2181
      ZOO_SERVERS: server.1=zookeeper:2888:3888;2181
    volumes:
      - zookeeper_data:/data
      - zookeeper_datalog:/datalog
    restart: unless-stopped

volumes:
  zookeeper_data:
  zookeeper_datalog:
