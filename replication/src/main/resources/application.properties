# Replication module properties Node 1
app.node.id=node1
app.node.host=localhost
server.port=8091

# Peer replication nodes (comma-separated base URLs, no trailing slash)
app.peers=http://localhost:8092,http://localhost:8093

# Quorum settings (N=3, W=2, R=2 W+R > N guarantees strong consistency)
app.replication.write-quorum=2
app.replication.read-quorum=2

# Idempotency cache TTL (must match @Value key in ReplicationConfig)
app.idempotency.ttl-minutes=5

logging.level.com.payment.replication=DEBUG