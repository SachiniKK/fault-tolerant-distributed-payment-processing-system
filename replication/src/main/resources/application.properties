# Replication module properties
app.node.id=node1
server.port=6001

# Peer replication nodes
app.peers=http://localhost:6002,http://localhost:6003

# Quorum settings (N=3, W=2, R=2 -> W+R > N for strong consistency)
app.replication.write-quorum=2
app.replication.read-quorum=2

# Deduplication TTL
app.dedup.ttl-minutes=5

logging.level.com.payment.replication=DEBUG
