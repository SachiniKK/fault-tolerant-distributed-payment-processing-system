<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayFlow | Distributed Payment System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(18, 18, 26, 0.8);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-primary: #ffffff;
            --text-secondary: #71717a;
            --text-muted: #52525b;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e;
            --glow-blue: rgba(59, 130, 246, 0.5);
            --glow-purple: rgba(139, 92, 246, 0.5);
            --glow-emerald: rgba(16, 185, 129, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }

        .bg-gradient::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 60%, rgba(16, 185, 129, 0.08) 0%, transparent 40%);
            animation: gradientMove 20s ease-in-out infinite;
        }

        @keyframes gradientMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2%, 2%) rotate(1deg); }
            50% { transform: translate(-1%, 3%) rotate(-1deg); }
            75% { transform: translate(3%, -2%) rotate(0.5deg); }
        }

        /* Grid Pattern Overlay */
        .grid-pattern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 48px;
            position: relative;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 8px 32px var(--glow-blue);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 32px var(--glow-blue); }
            50% { box-shadow: 0 8px 48px var(--glow-purple); }
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-emerald);
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .stat-value.blue { color: var(--accent-blue); }
        .stat-value.purple { color: var(--accent-purple); }
        .stat-value.emerald { color: var(--accent-emerald); }
        .stat-value.amber { color: var(--accent-amber); }

        /* Alert */
        .alert {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--accent-emerald);
        }

        .alert-error {
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: var(--accent-rose);
        }

        /* Nodes Grid */
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 4px;
            background: var(--accent-purple);
            border-radius: 50%;
        }

        .nodes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (max-width: 900px) {
            .nodes-grid {
                grid-template-columns: 1fr;
            }
        }

        .node-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .node-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .node-card:hover::before {
            opacity: 1;
        }

        .node-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow:
                0 32px 64px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .node-card.leader {
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 60px rgba(16, 185, 129, 0.15);
        }

        .node-card.leader::before {
            background: linear-gradient(90deg, var(--accent-emerald), var(--accent-blue));
            opacity: 1;
        }

        .node-card.down {
            opacity: 0.5;
            border-color: rgba(244, 63, 94, 0.3);
        }

        .node-card.down::before {
            background: var(--accent-rose);
            opacity: 1;
        }

        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .node-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .node-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .node-port {
            font-size: 13px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .node-badge {
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-leader {
            background: linear-gradient(135deg, var(--accent-emerald), #059669);
            color: #fff;
            box-shadow: 0 4px 16px var(--glow-emerald);
        }

        .badge-follower {
            background: rgba(139, 92, 246, 0.2);
            color: var(--accent-purple);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .badge-down {
            background: rgba(244, 63, 94, 0.2);
            color: var(--accent-rose);
            border: 1px solid rgba(244, 63, 94, 0.3);
        }

        .badge-candidate {
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent-amber);
            border: 1px solid rgba(245, 158, 11, 0.3);
            animation: candidatePulse 1s ease-in-out infinite;
        }

        @keyframes candidatePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .node-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .node-stat {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .node-stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .node-stat-value {
            font-size: 18px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-primary);
        }

        /* Payment Form */
        .payment-section {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .payment-section::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .payment-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .payment-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .payment-title {
            font-size: 20px;
            font-weight: 700;
        }

        .payment-form {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            align-items: end;
        }

        @media (max-width: 1000px) {
            .payment-form {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .payment-form {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-input {
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }

        .form-select {
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        .form-select option {
            background: var(--bg-secondary);
        }

        .btn-submit {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px var(--glow-purple);
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Log Section */
        .log-section {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 32px;
            position: relative;
            overflow: hidden;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .log-title-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .log-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-emerald));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .log-title {
            font-size: 20px;
            font-weight: 700;
        }

        .log-count {
            padding: 6px 14px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-blue);
            font-family: 'JetBrains Mono', monospace;
        }

        .log-entries {
            max-height: 420px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .log-entries::-webkit-scrollbar {
            width: 6px;
        }

        .log-entries::-webkit-scrollbar-track {
            background: transparent;
        }

        .log-entries::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .log-entries::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .log-entry {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            margin-bottom: 12px;
            transition: all 0.2s;
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .log-entry:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .log-index {
            min-width: 48px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .log-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 80px;
        }

        .log-term {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .log-command-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .log-type {
            padding: 4px 10px;
            background: rgba(139, 92, 246, 0.15);
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            color: var(--accent-purple);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .log-command {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .log-status {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .status-committed {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-emerald);
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-amber);
            animation: pendingPulse 2s ease-in-out infinite;
        }

        @keyframes pendingPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .empty-log {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-log-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-log-text {
            font-size: 15px;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .footer-divider {
            width: 4px;
            height: 4px;
            background: var(--border-color);
            border-radius: 50%;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-emerald);
            border-radius: 50%;
            animation: livePulse 1.5s ease-in-out infinite;
        }

        @keyframes livePulse {
            0%, 100% {
                opacity: 1;
                box-shadow: 0 0 0 0 var(--glow-emerald);
            }
            50% {
                opacity: 0.6;
                box-shadow: 0 0 0 4px transparent;
            }
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 25%, rgba(255,255,255,0.05) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: skeleton 1.5s ease-in-out infinite;
            border-radius: 8px;
        }

        @keyframes skeleton {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="grid-pattern"></div>

    <div class="container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <span class="logo-text">PayFlow</span>
            </div>
            <p class="header-subtitle">
                <span class="status-dot"></span>
                Distributed Payment Consensus System
            </p>
        </header>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Active Nodes</div>
                <div class="stat-value blue" id="activeNodes">0/3</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Current Term</div>
                <div class="stat-value purple" id="currentTerm">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Transactions</div>
                <div class="stat-value emerald" id="totalPayments">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Cluster Leader</div>
                <div class="stat-value amber" id="currentLeader">—</div>
            </div>
        </div>

        <div id="alert" class="alert"></div>

        <div class="section-title">Cluster Nodes</div>
        <div class="nodes-grid" id="nodesGrid">
            <!-- Nodes render here -->
        </div>

        <div class="payment-section">
            <div class="payment-header">
                <div class="payment-icon">💸</div>
                <h2 class="payment-title">Submit Payment</h2>
            </div>
            <div class="payment-form">
                <div class="form-group">
                    <label class="form-label">From</label>
                    <input type="text" id="fromUser" class="form-input" placeholder="sender_id">
                </div>
                <div class="form-group">
                    <label class="form-label">To</label>
                    <input type="text" id="toUser" class="form-input" placeholder="receiver_id">
                </div>
                <div class="form-group">
                    <label class="form-label">Amount</label>
                    <input type="number" id="amount" class="form-input" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">Currency</label>
                    <select id="currency" class="form-select">
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="LKR">LKR</option>
                    </select>
                </div>
                <div class="form-group">
                    <button class="btn-submit" onclick="submitPayment()">
                        Send Payment
                    </button>
                </div>
            </div>
        </div>

        <div class="log-section">
            <div class="log-header">
                <div class="log-title-group">
                    <div class="log-icon">📋</div>
                    <h2 class="log-title">Replicated Ledger</h2>
                </div>
                <div class="log-count" id="logCount">0 entries</div>
            </div>
            <div class="log-entries" id="logEntries">
                <div class="empty-log">
                    <div class="empty-log-icon">📭</div>
                    <p class="empty-log-text">No transactions yet. Submit a payment to begin.</p>
                </div>
            </div>
        </div>

        <footer class="footer">
            <div class="live-indicator">
                <span class="live-dot"></span>
                <span>Live</span>
            </div>
            <span class="footer-divider"></span>
            <span>Last sync: <span id="lastUpdate">—</span></span>
            <span class="footer-divider"></span>
            <span>Raft Consensus Protocol</span>
        </footer>
    </div>

    <script>
        const NODES = [
            { id: 'node1', port: 8071, name: 'Node Alpha' },
            { id: 'node2', port: 8072, name: 'Node Beta' },
            { id: 'node3', port: 8073, name: 'Node Gamma' }
        ];

        let currentLeaderPort = null;
        let lastKnownStatuses = NODES.map(n => ({ ...n, online: false, state: 'DOWN' }));

        async function fetchNodeStatus(node) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);

                const response = await fetch(`http://localhost:${node.port}/raft/status`, {
                    method: 'GET',
                    mode: 'cors',
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                if (!response.ok) throw new Error('Not OK');
                const data = await response.json();
                return { ...node, ...data, online: true };
            } catch (error) {
                return {
                    ...node,
                    online: false,
                    state: 'DOWN',
                    currentTerm: null,
                    logSize: null,
                    commitIndex: null,
                    votedFor: null
                };
            }
        }

        async function fetchLog() {
            for (const node of NODES) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 2000);

                    const response = await fetch(`http://localhost:${node.port}/raft/log`, {
                        method: 'GET',
                        mode: 'cors',
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);

                    if (response.ok) {
                        const data = await response.json();
                        return Array.isArray(data) ? data : [];
                    }
                } catch (error) {
                    continue;
                }
            }
            return [];
        }

        async function refreshStatus() {
            try {
                const statuses = await Promise.all(NODES.map(fetchNodeStatus));
                lastKnownStatuses = statuses;

                const leader = statuses.find(s => s.state === 'LEADER');
                currentLeaderPort = leader ? leader.port : null;

                updateNodesGrid(statuses);
                updateClusterInfo(statuses);

                const logEntries = await fetchLog();
                updateLogDisplay(logEntries);

                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Refresh error:', error);
                updateNodesGrid(lastKnownStatuses);
                updateClusterInfo(lastKnownStatuses);
            }
        }

        function updateNodesGrid(statuses) {
            try {
                const grid = document.getElementById('nodesGrid');
                if (!grid) return;

                grid.innerHTML = statuses.map(node => {
                    const state = node.state || 'DOWN';
                    const stateClass = state.toLowerCase();
                    const badgeClass = `badge-${stateClass}`;
                    const isOnline = node.online === true;

                    return `
                        <div class="node-card ${stateClass}">
                            <div class="node-header">
                                <div class="node-title">
                                    <span class="node-name">${node.name || 'Unknown'}</span>
                                    <span class="node-port">localhost:${node.port}</span>
                                </div>
                                <span class="node-badge ${badgeClass}">${state}</span>
                            </div>
                            <div class="node-stats">
                                <div class="node-stat">
                                    <div class="node-stat-label">Term</div>
                                    <div class="node-stat-value">${isOnline && node.currentTerm != null ? node.currentTerm : '—'}</div>
                                </div>
                                <div class="node-stat">
                                    <div class="node-stat-label">Log Size</div>
                                    <div class="node-stat-value">${isOnline && node.logSize != null ? node.logSize : '—'}</div>
                                </div>
                                <div class="node-stat">
                                    <div class="node-stat-label">Commit Idx</div>
                                    <div class="node-stat-value">${isOnline && node.commitIndex != null ? node.commitIndex : '—'}</div>
                                </div>
                                <div class="node-stat">
                                    <div class="node-stat-label">Voted For</div>
                                    <div class="node-stat-value">${isOnline && node.votedFor ? node.votedFor : '—'}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('updateNodesGrid error:', error);
            }
        }

        function updateClusterInfo(statuses) {
            try {
                const onlineNodes = statuses.filter(s => s.online === true);
                const activeNodes = onlineNodes.length;
                const leader = statuses.find(s => s.state === 'LEADER');

                // Safe calculation with defaults
                const terms = onlineNodes.map(s => Number(s.currentTerm) || 0);
                const logs = onlineNodes.map(s => Number(s.logSize) || 0);
                const maxTerm = terms.length > 0 ? Math.max(...terms) : 0;
                const maxLog = logs.length > 0 ? Math.max(...logs) : 0;

                const activeEl = document.getElementById('activeNodes');
                const termEl = document.getElementById('currentTerm');
                const paymentsEl = document.getElementById('totalPayments');
                const leaderEl = document.getElementById('currentLeader');

                if (activeEl) activeEl.textContent = `${activeNodes}/3`;
                if (termEl) termEl.textContent = maxTerm;
                if (paymentsEl) paymentsEl.textContent = maxLog;

                if (leaderEl) {
                    if (leader) {
                        const leaderNode = NODES.find(n => n.port === leader.port);
                        const leaderName = leaderNode ? leaderNode.name.split(' ')[1] : 'Unknown';
                        leaderEl.textContent = leaderName;
                    } else if (activeNodes === 0) {
                        leaderEl.textContent = 'Offline';
                    } else {
                        leaderEl.textContent = 'Election...';
                    }
                }
            } catch (error) {
                console.error('updateClusterInfo error:', error);
            }
        }

        function updateLogDisplay(entries) {
            try {
                const container = document.getElementById('logEntries');
                const countEl = document.getElementById('logCount');

                if (!container || !countEl) return;

                if (!entries || !Array.isArray(entries) || entries.length === 0) {
                    container.innerHTML = `
                        <div class="empty-log">
                            <div class="empty-log-icon">📭</div>
                            <p class="empty-log-text">No transactions yet. Submit a payment to begin.</p>
                        </div>
                    `;
                    countEl.textContent = '0 entries';
                    return;
                }

                countEl.textContent = `${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}`;

                // Sort safely
                const sortedEntries = [...entries].sort((a, b) => (b.index || 0) - (a.index || 0));

                container.innerHTML = sortedEntries.map((entry, i) => {
                    const command = entry.command || '';
                    const parts = command.split(':');
                    const type = parts[0] || 'CMD';
                    const details = parts.slice(1).join(' → ') || 'No details';

                    return `
                        <div class="log-entry" style="animation-delay: ${i * 0.05}s">
                            <span class="log-index">#${entry.index || '?'}</span>
                            <div class="log-meta">
                                <span class="log-term">Term ${entry.term || '?'}</span>
                            </div>
                            <div class="log-command-wrapper">
                                <span class="log-type">${type}</span>
                                <span class="log-command">${details}</span>
                            </div>
                            <span class="log-status ${entry.committed ? 'status-committed' : 'status-pending'}">
                                ${entry.committed ? '✓ Committed' : '◌ Pending'}
                            </span>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('updateLogDisplay error:', error);
            }
        }

        function showAlert(message, type) {
            try {
                const alert = document.getElementById('alert');
                if (!alert) return;

                alert.className = `alert alert-${type}`;
                alert.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> ${message}`;
                alert.style.display = 'flex';
                setTimeout(() => {
                    alert.style.display = 'none';
                }, 4000);
            } catch (error) {
                console.error('showAlert error:', error);
            }
        }

        async function submitPayment() {
            const fromUser = document.getElementById('fromUser').value || 'anonymous';
            const toUser = document.getElementById('toUser').value || 'merchant';
            const amount = document.getElementById('amount').value || '0';
            const currency = document.getElementById('currency').value;

            const command = `PAYMENT:${fromUser}:${toUser}:${amount}:${currency}`;

            const portsToTry = currentLeaderPort
                ? [currentLeaderPort, ...NODES.map(n => n.port).filter(p => p !== currentLeaderPort)]
                : NODES.map(n => n.port);

            for (const port of portsToTry) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 3000);

                    const response = await fetch(`http://localhost:${port}/raft/submit`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ command }),
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);

                    if (response.ok) {
                        const result = await response.json();
                        if (result.success) {
                            showAlert(`Payment #${result.index} submitted successfully`, 'success');
                            document.getElementById('fromUser').value = '';
                            document.getElementById('toUser').value = '';
                            document.getElementById('amount').value = '';
                            refreshStatus();
                            return;
                        }
                    }
                } catch (e) {
                    continue;
                }
            }

            showAlert('Failed to submit payment. Cluster may be unavailable.', 'error');
        }

        // Initialize with proper error handling
        (async function init() {
            try {
                await refreshStatus();
            } catch (e) {
                console.error('Initial refresh failed:', e);
            }
            setInterval(refreshStatus, 2000);
        })();
    </script>
</body>
</html>
